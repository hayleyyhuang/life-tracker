<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Life Tracker</title>
<style>
  :root{
    --font:"Calibri","Carlito","Segoe UI",system-ui,-apple-system,sans-serif;
    --bg:#e5efde;--surface:#ffffff;--surface-2:#eef5e9;--ink:#152219;--muted:#47584d;
    --line:#c3d5be;--primary:#1f6b42;--primary-ink:#fff;
    --pos:#157a3a;--neg:#c62525;--actual:#c06a15;--accent2:#6a45d1;
    --danger:#b23a3a;--shadow:0 1px 2px rgba(21,34,25,.08),0 4px 16px rgba(21,34,25,.07);--radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#0c1712;--surface:#14231a;--surface-2:#1c2e23;--ink:#eef6f0;--muted:#a1b6aa;
    --line:#2c4235;--primary:#5cc08d;--primary-ink:#08130c;
    --pos:#4cd583;--neg:#ff6f6f;--actual:#e29a52;--accent2:#b6a0f7;
    --danger:#e07a7a;--shadow:0 1px 2px rgba(0,0,0,.35),0 6px 20px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  .brand{font-weight:700;font-size:17px}.brand .leaf{color:var(--primary)}
  .ver{font-size:11px;color:var(--muted);font-weight:700;border:1px solid var(--line);padding:2px 7px;border-radius:999px}
  .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .seg button{font:inherit;border:0;background:transparent;color:var(--muted);padding:6px 11px;cursor:pointer;font-weight:600}
  .seg button.on{background:var(--primary);color:var(--primary-ink)}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--line)}
  .tab{border:1px solid transparent;background:transparent;color:var(--muted);padding:7px 13px;border-radius:999px;cursor:default;font:inherit;font-weight:600}
  .tab.active{color:var(--primary-ink);background:var(--primary)}
  .tab.soon{opacity:.5}
  .content{max-width:1000px;margin:0 auto;padding:22px clamp(14px,4vw,30px)}
  .demo-note{background:color-mix(in srgb,var(--primary) 14%,var(--surface));border:1px solid var(--primary);color:var(--ink);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:20px}
  .section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:22px}
  .section>h2{margin:0 0 4px;font-size:16px}.section>.hint{margin:0 0 16px;color:var(--muted);font-size:13px}
  .eyebrow{text-transform:capitalize;letter-spacing:.08em;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:12px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  label.field{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);font-weight:600}
  input,select{font:inherit;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;width:100%}
  input:focus,select:focus{outline:2px solid var(--primary);outline-offset:1px}
  .btn{font:inherit;font-weight:600;cursor:pointer;border-radius:9px;padding:9px 15px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink)}
  .btn:hover{border-color:var(--primary)}
  .btn.primary{background:var(--primary);color:var(--primary-ink);border-color:var(--primary)}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.danger{color:var(--danger);border-color:var(--danger);background:transparent}
  .btn.ghost{background:transparent}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:right;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  th.l,td.l{text-align:left}
  th{color:var(--muted);font-size:12px;text-transform:capitalize;letter-spacing:.04em}
  td.check,th.check{text-align:center;width:34px}
  tr.sel td{background:color-mix(in srgb,var(--primary) 12%,var(--surface))}
  .num{font-variant-numeric:tabular-nums}
  .pos{color:var(--pos);font-weight:700}.neg{color:var(--neg);font-weight:700}
  .kpis{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  .kpi{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .kpi .k-label{font-size:12px;color:var(--muted);font-weight:600}
  .kpi .k-value{font-size:22px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
  .kpi .k-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .runway-track{position:relative;height:10px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;margin-top:18px}
  .runway-fill{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,var(--primary),color-mix(in srgb,var(--primary) 55%,var(--bg)))}
  .runway-marker{position:absolute;top:-3px;width:2px;height:16px;background:var(--actual)}
  .runway-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}
  .chart{margin-top:22px;position:relative}.chart svg{width:100%;height:auto;display:block}
  .charttip{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px;box-shadow:var(--shadow);z-index:3;min-width:130px;display:none}
  .charttip b{display:block;margin-bottom:4px}
  .charttip i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px;justify-content:center}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .swatch{width:14px;height:3px;border-radius:2px;display:inline-block}
  .rowflex{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
  .batchbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
  .batchbar .count{font-weight:700}
  .subcard{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:20px}
  .over-result{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-top:16px}
  .over-result .kpi{background:var(--surface)}
  @media(max-width:560px){.content{padding:16px 12px}th,td{padding:8px 9px}}

  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;max-width:520px;width:100%;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 12px}
  .kpi.hero{background:var(--primary);color:var(--primary-ink);border-color:var(--primary)}
  .kpi.hero .k-label{color:var(--primary-ink);opacity:.85}
  .breakdown{width:100%;font-size:14px;margin-top:6px;border-collapse:collapse}
  .breakdown td{padding:6px 4px;border-bottom:1px solid var(--line)}
  .breakdown td:nth-child(2),.breakdown td:last-child{text-align:right;font-variant-numeric:tabular-nums}
  .breakdown tr.total td{font-weight:700;border-top:2px solid var(--line);border-bottom:none}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700}
  .pill.ok{background:color-mix(in srgb,var(--pos) 18%,var(--surface));color:var(--pos)}
  .pill.warn{background:color-mix(in srgb,var(--neg) 16%,var(--surface));color:var(--neg)}

  .pill.use{background:color-mix(in srgb,var(--accent2) 16%,var(--surface));color:var(--accent2)}
  .pill.done{background:color-mix(in srgb,var(--pos) 18%,var(--surface));color:var(--pos)}
  .pill.pan{background:color-mix(in srgb,var(--primary) 18%,var(--surface));color:var(--primary)}
  .wcell{display:flex;flex-direction:column;gap:3px;min-width:120px}
  .checkfield{flex-direction:row;align-items:center;gap:8px}
  input[type=checkbox]{width:auto}
  .btn.icon{padding:9px 12px}
  .bar{height:8px;border-radius:999px;background:var(--primary);min-width:2px}
  .bartrack{background:color-mix(in srgb,var(--line) 60%,var(--surface));border-radius:999px;overflow:hidden;width:110px}
  .sub{font-size:11px;color:var(--muted)}
  .modal{max-height:90vh;overflow:auto}
  html[data-accent="pan"]{--bg:#fbe6ee;--surface:#ffffff;--surface-2:#fdeef4;--ink:#3a1f2b;--muted:#8a6673;--line:#f2cdda;--primary:#c94f86;--primary-ink:#fff;--pos:#157a3a;--neg:#c62525;--accent2:#9750c9;--danger:#c23a5e}
  html[data-theme="dark"][data-accent="pan"]{--bg:#1a0e14;--surface:#26141d;--surface-2:#321a26;--ink:#f7e9ef;--muted:#c7a5b3;--line:#48283a;--primary:#f191b4;--primary-ink:#2a0f1a;--pos:#4cd583;--neg:#ff6f6f;--accent2:#c9a0f7;--danger:#e88aa4}
</style>

</head>

const MONTH_NAMES={january:1,jan:1,february:2,feb:2,march:3,mar:3,april:4,apr:4,may:5,june:6,jun:6,july:7,jul:7,august:8,aug:8,september:9,sep:9,sept:9,october:10,oct:10,november:11,nov:11,december:12,dec:12};
function addMonths(ym,n){const[y,m]=ym.split("-").map(Number);const i=y*12+(m-1)+n;return String(Math.floor(i/12)).padStart(4,"0")+"-"+String(i%12+1).padStart(2,"0");}
function monthsBetween(a,b){const[ay,am]=a.split("-").map(Number);const[by,bm]=b.split("-").map(Number);return(by*12+bm)-(ay*12+am);}
function fmtMonth(ym){if(!ym)return"";const[y,m]=ym.split("-").map(Number);return APP.lang==="zh"?`${y}年${m}月`:`${MONTHS_EN[m-1]} ${y}`;}
function gbp(n,cents){if(n==null||isNaN(n))return"—";return new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP",minimumFractionDigits:cents?2:0,maximumFractionDigits:cents?2:0}).format(n);}
function round2(n){return Math.round(n*100)/100;}
function instalmentNo(month){return monthsBetween(state.doc.loan.startMonth,month)+1;}
function currentRate(loan,month){const ps=(loan.ratePeriods||[]).filter(p=>p.startMonth<=month).sort((a,b)=>a.startMonth.localeCompare(b.startMonth));return ps.length?ps[ps.length-1].annualRatePct:(loan.ratePeriods?.[0]?.annualRatePct||0);}

function runProjection(bal,startMonth,rate,pay,over,cap=1200){
  const r=rate/100/12;const series=[{month:startMonth,balance:round2(bal)}];
  let interest=0,months=0,month=startMonth;
  for(let i=0;i<cap&&bal>0;i++){
    if(over&&over.mode==="lump"&&over.on&&month===over.on)bal=Math.max(0,bal-over.amount);
    const it=bal*r;let thisPay=pay;
    if(over&&over.mode==="monthly"){const inWin=month>=over.from&&(!over.to||month<=over.to);if(inWin)thisPay=pay+over.amount;}
    const principal=thisPay-it;
    if(principal<=0)return{series,months:Infinity,interest:Infinity,payoff:null};
    interest+=it;bal=Math.max(0,bal-principal);month=addMonths(month,1);months++;
    series.push({month,balance:round2(bal)});
  }
  return{series,months,interest:round2(interest),payoff:month};
}
function summarise(doc){
  const live=doc.actuals.filter(a=>!a.deleted).sort((a,b)=>a.month.localeCompare(b.month));
  const baselineByMonth=Object.fromEntries(doc.baseline.map(b=>[b.month,b.anticipatedBalance]));
  if(!live.length)return{empty:true,baselineByMonth};
  const last=live[live.length-1];
  const anticipatedNow=baselineByMonth[last.month]??null;
  const aheadBy=anticipatedNow!=null?round2(anticipatedNow-last.balance):null;
  const totalPaid=live.reduce((s,a)=>s+(a.payment||0),0);
  const interestPaid=round2(totalPaid-(doc.loan.startBalance-last.balance));
  const rate=currentRate(doc.loan,last.month);
  const base=runProjection(last.balance,last.month,rate,doc.loan.monthlyPayment,null);
  return{empty:false,baselineByMonth,currentBalance:last.balance,currentMonth:last.month,anticipatedNow,aheadBy,interestPaid,rate,
    projection:base.series,payoffMonth:base.payoff,baseMonths:base.months,baseInterest:base.interest,
    monthsToRemortgage:doc.loan.fixedRateEndMonth?monthsBetween(last.month,doc.loan.fixedRateEndMonth):null,startBalance:doc.loan.startBalance};
}
function overpayResult(doc,s){
  if(!s||s.empty||!state.over.applied||!state.over.parsed)return null;
  const scen=runProjection(s.currentBalance,s.currentMonth,s.rate,doc.loan.monthlyPayment,state.over.parsed);
  if(!scen.payoff)return null;
  return{series:scen.series,newPayoff:scen.payoff,monthsSaved:s.baseMonths-scen.months,interestSaved:round2(s.baseInterest-scen.interest)};
}
function matchesSearch(month){
  if(state.from&&month<state.from)return false;
  if(state.to&&month>state.to)return false;
  const q=state.search.trim().toLowerCase();if(!q)return true;
  const[y,m]=month.split("-");
  if(/^\d{4}$/.test(q))return y===q;
  if(/^\d{1,2}$/.test(q))return Number(m)===Number(q);
  if(MONTH_NAMES[q])return Number(m)===MONTH_NAMES[q];
  return fmtMonth(month).toLowerCase().includes(q);
}
function filteredRows(doc){return doc.actuals.filter(a=>!a.deleted).filter(a=>matchesSearch(a.month)).sort((a,b)=>b.month.localeCompare(a.month));}
function shownRows(doc){const f=filteredRows(doc);return state.pageSize==="all"?f:f.slice(0,state.pageSize);}

/* ====== month/year dropdowns (for early repayment) ====== */
function monthOpts(sel){let o="";for(let m=1;m<=12;m++){const lab=APP.lang==="zh"?m+"月":MONTHS_EN[m-1];o+=`<option value="${m}" ${sel==m?"selected":""}>${lab}</option>`;}return o;}
function yearOpts(sel){const y0=+state.doc.loan.startMonth.slice(0,4);const yN=+state.doc.baseline[state.doc.baseline.length-1].month.slice(0,4);let o="";for(let y=y0;y<=yN;y++)o+=`<option value="${y}" ${sel==y?"selected":""}>${y}</option>`;return o;}
function ymDropdown(idp,ym,blank,minMonth){
  const base=state.doc.baseline;
  const has=ym&&/^\d{4}-\d{2}$/.test(ym);
  let o=blank?`<option value="" ${!has?"selected":""}>${t("over.blank")}</option>`:"";
  o+=base.filter(b=>!minMonth||b.month>=minMonth).map(b=>`<option value="${b.month}" ${has&&b.month===ym?"selected":""}>${fmtMonth(b.month)}</option>`).join("");
  return `<select id="${idp}">${o}</select>`;
}
function readYm(idp,fallback){const el=document.getElementById(idp);if(!el)return fallback;return el.value||"";}

/* ====== chart (axis lines only, no gridlines) ====== */
let CHART=null;
function chartSVG(doc,s,overSeries){
  const W=720,H=300,padL=46,padR=12,padT=12,padB=24;
  const base=doc.baseline;const N=base.length;
  const idx=Object.fromEntries(base.map((b,i)=>[b.month,i]));
  const maxBal=doc.loan.startBalance;
  const x=i=>padL+(i/(N-1))*(W-padL-padR);
  const y=v=>padT+(1-v/maxBal)*(H-padT-padB);
  const path=pts=>pts.map((p,k)=>(k?"L":"M")+x(p.i).toFixed(1)+" "+y(p.v).toFixed(1)).join(" ");

  // axis labels (no gridlines)
  let lab="";[0,.25,.5,.75,1].forEach(f=>{const val=maxBal*f,yy=y(val);lab+=`<text x="${padL-6}" y="${yy+3}" text-anchor="end" font-size="10" fill="var(--muted)">${Math.round(val/1000)}k</text>`;});
  let ly="";base.forEach((b,i)=>{const yr=b.month.slice(0,4);if(yr!==ly&&i%24===0){ly=yr;lab+=`<text x="${x(i)}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--muted)">${yr}</text>`;}});
  // just the two axis lines
  const axes=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="var(--muted)" stroke-width="1"/>
              <line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="var(--muted)" stroke-width="1"/>`;
  // fixed-rate reference marker (kept — it's data, not a gridline)
  let fix="";if(doc.loan.fixedRateEndMonth&&idx[doc.loan.fixedRateEndMonth]!=null){const fx=x(idx[doc.loan.fixedRateEndMonth]);fix=`<line x1="${fx}" y1="${padT}" x2="${fx}" y2="${H-padB}" stroke="var(--actual)" stroke-dasharray="4 3"/>`;}

  const antPts=base.map((b,i)=>({i,v:b.anticipatedBalance}));
  const actualBy=Object.fromEntries(doc.actuals.filter(a=>!a.deleted).map(a=>[a.month,a.balance]));
  const projBy=Object.fromEntries((s.projection||[]).map(p=>[p.month,p.balance]));
  const overBy=Object.fromEntries((overSeries||[]).map(p=>[p.month,p.balance]));
  const actPts=Object.keys(actualBy).filter(m=>idx[m]!=null).map(m=>({i:idx[m],v:actualBy[m]}));
  const projPts=(s.projection||[]).filter(p=>idx[p.month]!=null).map(p=>({i:idx[p.month],v:p.balance}));
  const overPts=(overSeries||[]).filter(p=>idx[p.month]!=null).map(p=>({i:idx[p.month],v:p.balance}));
  const dots=actPts.map(p=>`<circle cx="${x(p.i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.4" fill="var(--actual)"/>`).join("");

  CHART={W,H,padL,padR,padT,padB,N,series:base.map((b,i)=>({month:b.month,anticipated:b.anticipatedBalance,actual:actualBy[b.month]??null,projection:projBy[b.month]??null,overpay:overBy[b.month]??null}))};

  const overPath=overPts.length?`<path d="${path(overPts)}" fill="none" stroke="var(--accent2)" stroke-width="1.8" stroke-dasharray="2 3"/>`:"";
  return `<svg id="balchart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Balance over time">
    ${lab}${axes}${fix}
    <line id="hoverline" x1="0" x2="0" y1="${padT}" y2="${H-padB}" stroke="var(--ink)" stroke-opacity="0.35" stroke-width="1" style="display:none"/>
    <path d="${path(projPts)}" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-dasharray="6 4"/>
    ${overPath}
    <path d="${path(actPts)}" fill="none" stroke="var(--actual)" stroke-width="2"/>${dots}</svg>`;
}
function fmtDur(months){if(months<0)months=0;const y=Math.floor(months/12),m=months%12;return(y?y+t("over.yrs"):"")+(m?" "+m+t("over.mos"):(y?"":"0"+t("over.mos")));}

/* ====== focus preservation ====== */
function captureFocus(){const el=document.activeElement;if(!el||!el.id)return null;let sel=null;try{sel={s:el.selectionStart,e:el.selectionEnd};}catch(e){}return{id:el.id,sel};}
function restoreFocus(f){if(!f)return;const el=document.getElementById(f.id);if(!el)return;el.focus();if(f.sel){try{el.setSelectionRange(f.sel.s,f.sel.e);}catch(e){}}}

/* ====== render ====== */
function render(){
  const focus=captureFocus();

  const doc=state.doc,s=summarise(doc);
  const live=doc.actuals.filter(a=>!a.deleted).sort((a,b)=>a.month.localeCompare(b.month));
  const lastMonth=live.length?live[live.length-1].month:doc.loan.startMonth;
  const nextMonth=live.length?addMonths(lastMonth,1):doc.loan.startMonth;
  const sched=doc.baseline.find(b=>b.month===nextMonth);
  const baseByMonth=Object.fromEntries(doc.baseline.map(b=>[b.month,b.anticipatedBalance]));

  /* input */
  const input=`<section class="section"><h2>${t("sec.input.title")}</h2>
    <div class="grid">
      <label class="field">${t("m.month")}<input id="i_month" value="${ymToInput(nextMonth)}" placeholder="YYYYMM"></label>
      <label class="field">${t("m.balance")} (£)<input type="number" step="0.01" id="i_balance" value="${sched?sched.anticipatedBalance:""}"></label>
      <label class="field">${t("m.payment")} (£)<input type="number" step="0.01" id="i_payment" value="${doc.loan.monthlyPayment}"></label>
      <label class="field">${t("m.interest")} (£)<input type="number" step="0.01" id="i_interest" placeholder="—"></label>
    </div>
    <div style="margin-top:14px"><button class="btn primary" id="addBtn">${t("action.add")}</button></div></section>`;

  /* review */
  const filtered=filteredRows(doc);const rows=shownRows(doc);
  const selCount=state.selected.size;
  const allShownSelected=rows.length>0&&rows.every(r=>state.selected.has(r.month));
  const reviewRows=rows.map(a=>{
    const ant=baseByMonth[a.month];const diff=ant!=null?ant-a.balance:null;const on=state.selected.has(a.month);
    return `<tr class="${on?"sel":""}">
      <td class="check"><input type="checkbox" data-sel="${a.month}" ${on?"checked":""} style="width:auto"></td>
      <td class="l">${fmtMonth(a.month)}</td>
      <td class="num">${instalmentNo(a.month)} / ${doc.loan.termMonths}</td>
      <td class="num">${gbp(a.balance,true)}</td>
      <td class="num" style="color:var(--muted)">${gbp(ant)}</td>
      <td class="num ${diff>0?"pos":diff<0?"neg":""}">${diff==null?"—":(diff>=0?"▲ ":"▼ ")+gbp(Math.abs(diff))}</td>
      <td class="num">${gbp(a.payment,true)}</td>
      <td style="text-align:right"><button class="btn sm ghost" data-edit="${a.month}">${t("action.edit")}</button> <button class="btn sm danger" data-del="${a.month}">${t("action.delete")}</button></td></tr>`;
  }).join("");
  const batchBar=selCount?`<div class="batchbar">
      <span class="count">${selCount} ${t("batch.selected")}</span>
      <input type="number" step="0.01" id="batchRepay" placeholder="${t("batch.setRepayment")}" style="max-width:160px">
      <button class="btn sm" id="batchApply">${t("batch.apply")}</button>
      <button class="btn sm danger" id="batchDelete">${t("batch.delete")}</button>
      <button class="btn sm ghost" id="batchClear">${t("batch.clear")}</button>
    </div>`:"";
  const review=`<section class="section"><h2>${t("sec.review.title")}</h2>
    <div class="rowflex">
      <label class="field" style="flex:1;min-width:200px">${t("search.text")}<input id="searchBox" value="${state.search.replace(/"/g,"&quot;")}"></label>
      <label class="field">${t("search.from")}<input id="fromBox" value="${ymToInput(state.from)}" placeholder="YYYYMM"></label>
      <label class="field">${t("search.to")}<input id="toBox" value="${ymToInput(state.to)}" placeholder="YYYYMM"></label>
      <label class="field">${t("review.show")}<select id="pageSize">${[15,25,50,100].map(n=>`<option value="${n}" ${state.pageSize===n?"selected":""}>${n}</option>`).join("")}<option value="all" ${state.pageSize==="all"?"selected":""}>${t("review.all")}</option></select></label>
      <button class="btn sm ghost" id="clearSearch">${t("search.clear")}</button>
    </div>
    ${batchBar}
    ${rows.length?`<div class="table-wrap"><table><thead><tr>
      <th class="check"><input type="checkbox" id="selAll" ${allShownSelected?"checked":""} title="${t("batch.selectAll")}" style="width:auto"></th>
      <th class="l">${t("m.month")}</th><th>${t("m.instalment")}</th><th>${t("m.balance")}</th><th>${t("m.anticipated")}</th><th>${t("m.vsSchedule")}</th><th>${t("m.payment")}</th><th></th>
    </tr></thead><tbody>${reviewRows}</tbody></table></div>`:`<div class="hint">${t("empty.actuals")}</div>`}
    ${filtered.length?`<div class="hint" style="margin-top:10px">${t("review.showing",{n:rows.length,m:filtered.length})}</div>`:""}</section>`;

  /* insights */
  let insights;
  if(s.empty){insights=`<section class="section"><h2>${t("sec.insights.title")}</h2><p class="hint">${t("empty.actuals")}</p></section>`;}
  else{
    const aheadGood=s.aheadBy!=null&&s.aheadBy>=0;
    const pctPaid=(1-s.currentBalance/s.startBalance)*100;
    const mEnd=doc.baseline.find(b=>b.month===doc.loan.fixedRateEndMonth);
    const markerPct=mEnd?Math.max(0,Math.min(100,(1-mEnd.anticipatedBalance/s.startBalance)*100)):null;
    const ov=overpayResult(doc,s);
    const overSeries=ov?ov.series:null;
    const modeLump=state.over.mode==="lump";
    const dateFields=modeLump
      ? `<label class="field">${t("over.on")}${ymDropdown("ovOn",state.over.on||s.currentMonth,false,s.currentMonth)}</label>`
      : `<label class="field">${t("over.from")}${ymDropdown("ovFrom",state.over.from||s.currentMonth,false,s.currentMonth)}</label>
         <label class="field">${t("over.to")}${ymDropdown("ovTo",state.over.to,true,s.currentMonth)}</label>`;
    const overCard=`<div class="subcard">
      <div class="eyebrow">${t("over.title")}</div>
      <div class="grid">
        <label class="field">${t("over.mode")}<select id="ovMode">
          <option value="lump" ${modeLump?"selected":""}>${t("over.mode.lump")}</option>
          <option value="monthly" ${!modeLump?"selected":""}>${t("over.mode.monthly")}</option>
        </select></label>
        <label class="field">${t("over.amount")}<input type="number" step="1" id="ovAmount" value="${state.over.amount}" placeholder="e.g. 10000"></label>
        ${dateFields}
      </div>
      <div style="margin-top:14px;display:flex;gap:8px"><button class="btn primary" id="ovCalc">${t("over.calc")}</button>${state.over.applied?`<button class="btn ghost" id="ovClear">${t("over.clear")}</button>`:""}</div>
      ${ov?`<div class="over-result">
        <div class="kpi"><div class="k-label">${t("over.newPayoff")}</div><div class="k-value">${fmtMonth(ov.newPayoff)}</div><div class="k-sub">${t("kpi.payoff")}: ${fmtMonth(s.payoffMonth)}</div></div>
        <div class="kpi"><div class="k-label">${t("over.timeSaved")}</div><div class="k-value" style="color:var(--pos)">${fmtDur(ov.monthsSaved)}</div><div class="k-sub">${ov.monthsSaved} ${t("kpi.months")}</div></div>
        <div class="kpi"><div class="k-label">${t("over.interestSaved")}</div><div class="k-value" style="color:var(--pos)">${gbp(ov.interestSaved)}</div><div class="k-sub">@ ${s.rate}%</div></div>
      </div>`:`<p class="hint" style="margin-top:14px">${t("over.enterAmount")}</p>`}
    </div>`;

    const houseValue=REMORTGAGE.houseValue;
    const ltv=s.currentBalance/houseValue*100;
    const remN=doc.loan.termMonths-instalmentNo(s.currentMonth);
    const remRows=REMORTGAGE.fixes.map(f=>{const m=annuityPayment(s.currentBalance,f.r,remN);const d=m-doc.loan.monthlyPayment;return `<tr><td class="l">${t("rem.years",{n:f.y})}</td><td class="num">${f.r}%</td><td class="num">${gbp(m,true)}</td><td class="num neg">+${gbp(d,true)}</td></tr>`;}).join("");
    const remCard=`<div class="subcard">
      <div class="eyebrow">${t("rem.title")}</div>
      <div style="margin-bottom:10px">${t("rem.ltv")}: <b>${ltv.toFixed(1)}%</b> <span style="color:var(--muted);font-size:12px">(${gbp(s.currentBalance)} / ${gbp(houseValue)})</span></div>
      <div class="table-wrap"><table><thead><tr><th class="l">${t("rem.fix")}</th><th>${t("rem.rate")}</th><th>${t("rem.monthly")}</th><th>${t("rem.delta")}</th></tr></thead><tbody>${remRows}</tbody></table></div>
      <p class="hint" style="margin-top:10px;font-size:11px">${t("rem.asof",{d:REMORTGAGE.asOf})}</p>
    </div>`;
    insights=`<section class="section"><h2>${t("sec.insights.title")}</h2>
      <div class="kpis">
        <div class="kpi"><div class="k-label">${t("kpi.currentBalance")}</div><div class="k-value">${gbp(s.currentBalance)}</div><div class="k-sub">${fmtMonth(s.currentMonth)}</div></div>
        <div class="kpi"><div class="k-label">${t("kpi.vsSchedule")}</div><div class="k-value" style="color:${aheadGood?"var(--pos)":"var(--neg)"}">${s.aheadBy==null?"—":(aheadGood?"▲ ":"▼ ")+gbp(Math.abs(s.aheadBy))}</div><div class="k-sub">${aheadGood?t("ins.ahead"):t("ins.behind")}</div></div>
        <div class="kpi"><div class="k-label">${t("kpi.interestPaid")}</div><div class="k-value">${gbp(s.interestPaid)}</div><div class="k-sub">${s.rate}%</div></div>
        <div class="kpi"><div class="k-label">${t("kpi.payoff")}</div><div class="k-value">${fmtMonth(s.payoffMonth)}</div><div class="k-sub">${t("kpi.remortgage")}: ${s.monthsToRemortgage} ${t("kpi.months")}</div></div>
      </div>
      <div class="runway-track"><div class="runway-fill" style="width:${pctPaid}%"></div>${markerPct!=null?`<div class="runway-marker" style="left:${markerPct}%" title="${t("loan.fixedEnd")}"></div>`:""}</div>
      <div class="runway-legend"><span>${t("ins.runwayStart")} · ${gbp(s.startBalance)}</span><span>${pctPaid.toFixed(1)}%</span><span>${t("ins.runwayEnd")} · £0</span></div>
      <div class="chart">${chartSVG(doc,s,overSeries)}<div class="charttip" id="chartTip"></div>
        <div class="legend">
          <span><i class="swatch" style="background:var(--primary)"></i>${t("ins.chartProjection")}</span>
          ${overSeries?`<span><i class="swatch" style="background:var(--accent2)"></i>${t("over.line")}</span>`:""}
          <span><i class="swatch" style="background:var(--actual)"></i>${t("ins.chartActual")}</span>
          <span><i class="swatch" style="background:var(--actual);height:10px;width:2px"></i>${t("loan.fixedEnd")}</span>
        </div>
      </div>
      ${remCard}${overCard}</section>`;
  }

  document.getElementById("app").innerHTML=input+review+insights;
  wire();
  attachChartHover();
  restoreFocus(focus);
}

/* ====== chart hover ====== */
function attachChartHover(){
  const svg=document.getElementById("balchart");if(!svg||!CHART)return;
  const tip=document.getElementById("chartTip");const line=document.getElementById("hoverline");const wrap=svg.closest(".chart");
  svg.addEventListener("mousemove",ev=>{
    const rect=svg.getBoundingClientRect();const scale=rect.width/CHART.W;
    const xSvg=(ev.clientX-rect.left)/scale;
    let frac=(xSvg-CHART.padL)/(CHART.W-CHART.padL-CHART.padR);frac=Math.max(0,Math.min(1,frac));
    const i=Math.round(frac*(CHART.N-1));const d=CHART.series[i];if(!d)return;
    const px=CHART.padL+(i/(CHART.N-1))*(CHART.W-CHART.padL-CHART.padR);
    line.setAttribute("x1",px);line.setAttribute("x2",px);line.style.display="";
    let html=`<b>${fmtMonth(d.month)}</b>`;
    if(d.actual!=null)html+=`<div><i style="background:var(--actual)"></i>${t("ins.chartActual")}: ${gbp(d.actual)}</div>`;
    if(d.projection!=null)html+=`<div><i style="background:var(--primary)"></i>${t("ins.chartProjection")}: ${gbp(d.projection)}</div>`;
    if(d.overpay!=null)html+=`<div><i style="background:var(--accent2)"></i>${t("over.line")}: ${gbp(d.overpay)}</div>`;
    tip.innerHTML=html;tip.style.display="block";
    const wr=wrap.getBoundingClientRect();let left=ev.clientX-wr.left+14,top=ev.clientY-wr.top+14;
    if(left>wr.width-150)left=ev.clientX-wr.left-150;tip.style.left=left+"px";tip.style.top=top+"px";
  });
  svg.addEventListener("mouseleave",()=>{tip.style.display="none";line.style.display="none";});
}

/* ====== read overpay inputs (DOM -> state) ====== */
function readOverInputs(){
  const md=document.getElementById("ovMode");if(md)state.over.mode=md.value;
  const a=document.getElementById("ovAmount");if(a)state.over.amount=a.value;
  state.over.on=readYm("ovOn",state.over.on);
  state.over.from=readYm("ovFrom",state.over.from);
  state.over.to=readYm("ovTo",state.over.to);
}

/* ====== events ====== */
function wire(){
  const doc=state.doc,s=summarise(doc);
  const addBtn=document.getElementById("addBtn");
  if(addBtn)addBtn.onclick=()=>{
    const ym=inputToYm(document.getElementById("i_month").value);
    if(!ym){alert("Enter the month as YYYYMM, e.g. 202607");return;}
    const balance=parseFloat(document.getElementById("i_balance").value);if(isNaN(balance))return;
    if(doc.actuals.some(a=>a.month===ym&&!a.deleted)){alert("An entry for "+ym+" already exists.");return;}
    const payment=parseFloat(document.getElementById("i_payment").value)||doc.loan.monthlyPayment;
    const iv=document.getElementById("i_interest").value;
    doc.actuals.push({month:ym,balance,payment,interest:iv===""?null:parseFloat(iv),capital:null,note:"",source:"manual",deleted:false});
    doc.actuals.sort((a,b)=>a.month.localeCompare(b.month));render();
  };

  const sb=document.getElementById("searchBox");if(sb)sb.oninput=e=>{state.search=e.target.value;render();};
  const fb=document.getElementById("fromBox");if(fb)fb.onchange=e=>{const v=inputToYm(e.target.value);state.from=(v&&v!=="")?v:"";render();};
  const tb=document.getElementById("toBox");if(tb)tb.onchange=e=>{const v=inputToYm(e.target.value);state.to=(v&&v!=="")?v:"";render();};
  const cs=document.getElementById("clearSearch");if(cs)cs.onclick=()=>{state.search="";state.from="";state.to="";render();};
  const ps=document.getElementById("pageSize");if(ps)ps.onchange=e=>{state.pageSize=e.target.value==="all"?"all":parseInt(e.target.value,10);render();};

  document.querySelectorAll("[data-sel]").forEach(c=>c.onchange=()=>{const m=c.dataset.sel;c.checked?state.selected.add(m):state.selected.delete(m);render();});
  const selAll=document.getElementById("selAll");
  if(selAll)selAll.onchange=()=>{const rs=shownRows(doc);if(selAll.checked)rs.forEach(r=>state.selected.add(r.month));else rs.forEach(r=>state.selected.delete(r.month));render();};

  const ba=document.getElementById("batchApply");
  if(ba)ba.onclick=()=>{const v=parseFloat(document.getElementById("batchRepay").value);if(isNaN(v)){alert("Enter a repayment amount.");return;}doc.actuals.forEach(a=>{if(state.selected.has(a.month))a.payment=v;});render();};
  const bd=document.getElementById("batchDelete");
  if(bd)bd.onclick=()=>{const n=state.selected.size;if(!n)return;if(confirm(t("confirm.deleteN",{n,s:n>1?"ies":"y"}))){doc.actuals.forEach(a=>{if(state.selected.has(a.month))a.deleted=true;});state.selected.clear();render();}};
  const bc=document.getElementById("batchClear");if(bc)bc.onclick=()=>{state.selected.clear();render();};

  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm(t("confirm.delete"))){const a=doc.actuals.find(x=>x.month===b.dataset.del);if(a)a.deleted=true;state.selected.delete(b.dataset.del);render();}});
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{const a=doc.actuals.find(x=>x.month===b.dataset.edit);if(!a)return;const nb=prompt(t("m.balance")+" (£) — "+a.month,a.balance);if(nb===null)return;const v=parseFloat(nb);if(!isNaN(v)){a.balance=v;render();}});

  const om=document.getElementById("ovMode");if(om)om.onchange=()=>{readOverInputs();render();};
  const oc=document.getElementById("ovCalc");
  if(oc)oc.onclick=()=>{
    readOverInputs();
    const amt=parseFloat(state.over.amount);
    if(isNaN(amt)||amt<=0){alert(t("over.invalidAmt"));return;}
    let parsed;
    if(state.over.mode==="lump")parsed={mode:"lump",amount:amt,on:state.over.on||s.currentMonth};
    else parsed={mode:"monthly",amount:amt,from:state.over.from||s.currentMonth,to:state.over.to||null};
    state.over.parsed=parsed;state.over.applied=true;render();
  };
  const ocl=document.getElementById("ovClear");if(ocl)ocl.onclick=()=>{state.over.applied=false;state.over.parsed=null;render();};
}



function exportRows(){const rows=state.doc.actuals.filter(a=>!a.deleted).sort((a,b)=>a.month.localeCompare(b.month)).map(a=>[a.month,a.balance,a.payment,a.interest,a.note]);return {filename:"mortgage",headers:["Month","Balance","Payment","Interest","Note"],rows};}
function exportSheets(){const e=exportRows();return {filename:e.filename,sheets:[{name:"Balances",headers:e.headers,rows:e.rows}]};}
return {render, getDoc:()=>state.doc, exportRows, exportSheets};

/* 2026/27 tax constants */
const CB_ELDEST=27.05, CB_OTHER=17.90, HICBC_LOW=60000, HICBC_HIGH=80000;
function personalAllowance(x){return x<=100000?12570:Math.max(0,12570-Math.floor((x-100000)/2));}
function incomeTax(x){const pa=personalAllowance(x);const t=Math.max(0,x-pa);let tax=Math.min(t,37700)*0.20;tax+=Math.min(Math.max(t-37700,0),74870)*0.40;tax+=Math.max(t-37700-74870,0)*0.45;return tax;}
function employeeNI(x){let ni=Math.max(0,Math.min(x,50270)-12570)*0.08;ni+=Math.max(0,x-50270)*0.02;return ni;}
function childBenefitYear(n){return (CB_ELDEST + CB_OTHER*Math.max(0,n-1))*52;}
function hicbc(ani,cb){if(ani<=HICBC_LOW)return 0;if(ani>=HICBC_HIGH)return cb;return cb*Math.min(100,Math.floor((ani-HICBC_LOW)/200))/100;}

function money(n,cents){if(n==null||isNaN(n))return"—";return new Intl.NumberFormat("en-GB",{minimumFractionDigits:cents?2:0,maximumFractionDigits:cents?2:0}).format(n);}
function ymToInput(ym){return ym?ym.replace("-",""):"";}
function inputToYm(str){if(str===""||str==null)return"";const d=String(str).replace(/\D/g,"");if(d.length!==6)return null;const m=+d.slice(4,6);if(m<1||m>12)return null;return d.slice(0,4)+"-"+d.slice(4,6);}
function liveRows(){return state.doc.rows.filter(r=>!r.deleted);}

function computeWhatIf(w){
  const regPension=(+w.salary||0)*(+w.pensionPct||0)/100;
  const totalPension=regPension+(+w.bonusSac||0);
  const taxable=Math.max(0,(+w.salary||0)+(+w.bonus||0)-totalPension-(+w.baye||0)-(+w.holiday||0));
  const tax=incomeTax(taxable), ni=employeeNI(taxable);
  const postTax=(+w.saye||0)+(+w.dental||0);
  const net=taxable-tax-ni-postTax;
  const ani=taxable, cb=childBenefitYear(1), charge=hicbc(ani,cb);
  return {regPension,totalPension,taxable,tax,ni,postTax,net,ani,cb,charge,keep:cb-charge,extraPension:Math.max(0,ani-HICBC_LOW)};
}

function captureFocus(){const el=document.activeElement;if(!el||!el.id)return null;let sel=null;try{sel={s:el.selectionStart,e:el.selectionEnd};}catch(e){}return{id:el.id,sel};}
function restoreFocus(f){if(!f)return;const el=document.getElementById(f.id);if(!el)return;el.focus();if(f.sel){try{el.setSelectionRange(f.sel.s,f.sel.e);}catch(e){}}}

function render(){
  const focus=captureFocus();
  document.getElementById("app").innerHTML=inputSection()+reviewSection()+insightsSection()+editModal();
  wire();
  recomputeWhatIf();
  restoreFocus(focus);
}

function inputSection(){
  const last=liveRows().slice(-1)[0]||{};
  return `<section class="section"><h2>${t("sec.input.title")}</h2>
    <div class="grid">
      <label class="field">${t("f.month")}<input id="i_month" placeholder="YYYYMM"></label>
      <label class="field">${t("f.salary")}<input type="number" step="0.01" id="i_salary" value="${last.salary||""}"></label>
      <label class="field">${t("f.pension")}<input type="number" step="0.01" id="i_pension" placeholder="e.g. -405"></label>
      <label class="field">${t("f.pretax")}<input type="number" step="0.01" id="i_pretax" placeholder="e.g. -297"></label>
      <label class="field">${t("f.paye")}<input type="number" step="0.01" id="i_paye"></label>
      <label class="field">${t("f.ni")}<input type="number" step="0.01" id="i_ni"></label>
      <label class="field">${t("f.saye")}<input type="number" step="0.01" id="i_saye"></label>
      <label class="field">${t("f.dental")}<input type="number" step="0.01" id="i_dental"></label>
    </div>
    <div style="margin-top:14px"><button class="btn primary" id="addBtn">${t("action.add")}</button></div></section>`;
}

function filteredRows(){
  const q=state.search.trim().toLowerCase();
  return liveRows().filter(r=>!q||r.month.includes(q)||(r.fy||"").toLowerCase().includes(q)).sort((a,b)=>b.month.localeCompare(a.month));
}

  const body=rows.map(r=>`<tr>
      <td class="l">${fmtMonth(r.month)}</td>
      <td class="l" style="color:var(--muted)">${r.taxCode||""}</td>
      <td class="num">${money(r.salary)}</td>
      <td class="num">${money(r.pension)}</td>
      <td class="num">${money(r.gross)}</td>
      <td class="num">${money(r.paye)}</td>
      <td class="num">${money(r.ni)}</td>
      <td class="num">${money(r.saye)}</td>
      <td class="num">${money(r.dental)}</td>
      <td class="num" style="font-weight:700">${money(r.net)}</td>
      <td style="text-align:right;white-space:nowrap"><button class="btn sm ghost" data-edit="${r.month}">${t("action.edit")}</button> <button class="btn sm danger" data-del="${r.month}">${t("action.delete")}</button></td>

    </div>
    ${rows.length?`<div class="table-wrap"><table><thead><tr>
      <th class="l">${t("f.month")}</th><th class="l">${t("f.taxcode")}</th><th>${t("f.salary")}</th><th>${t("f.pension")}</th><th>${t("f.gross")}</th><th>${t("f.paye")}</th><th>${t("f.ni")}</th><th>${t("f.saye")}</th><th>${t("f.dental")}</th><th>${t("f.net")}</th><th></th>
    </tr></thead><tbody>${body}</tbody></table></div>
    <div class="eyebrow" style="margin-top:10px">${t("review.showing",{n:rows.length,m:all.length})}</div>`:`<div style="color:var(--muted)">${t("empty")}</div>`}</section>`;

function editModal(){
  if(!state.edit)return"";
  const r=liveRows().find(x=>x.month===state.edit);if(!r)return"";
  const f=(id,label,val)=>`<label class="field">${label}<input type="number" step="0.01" id="e_${id}" value="${val==null?"":val}"></label>`;
  return `<div class="modal-back" id="editBack"><div class="modal">
    <h3>${fmtMonth(r.month)}</h3>
    <div class="grid">
      ${f("salary",t("f.salary"),r.salary)}
      ${f("pension",t("f.pension"),r.pension)}
      ${f("pretax",t("f.pretax"),r.preTax)}
      ${f("paye",t("f.paye"),r.paye)}
      ${f("ni",t("f.ni"),r.ni)}
      ${f("saye",t("f.saye"),r.saye)}
      ${f("dental",t("f.dental"),r.dental)}

    <div class="row" style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn ghost" id="editCancel">${t("action.cancel")}</button>
      <button class="btn primary" id="editSave">${t("action.save")}</button>

}

function insightsSection(){
  const w=state.whatif;
  const wf=(id,label,val,step)=>`<label class="field">${label}<input type="number" step="${step||"1"}" id="wi_${id}" value="${val}"></label>`;
  const whatif=`<div class="subcard">
    <div class="eyebrow">${t("wi.title")}</div>
    <div class="grid">
      ${wf("salary",t("wi.salary"),w.salary)}
      ${wf("bonus",t("wi.bonus"),w.bonus)}
      ${wf("pensionPct",t("wi.pensionpct"),w.pensionPct,"0.1")}
      ${wf("bonusSac",t("wi.bonussac"),w.bonusSac)}
      ${wf("baye",t("wi.baye"),w.baye)}
      ${wf("holiday",t("wi.holiday"),w.holiday)}
      ${wf("saye",t("wi.saye"),w.saye)}
      ${wf("dental",t("wi.dental"),w.dental)}
    </div>
    <div id="wiResult"></div>
  </div>`;
  return `<section class="section"><h2>${t("sec.insights.title")}</h2>
    ${whatif}
    <div class="subcard"><div class="eyebrow">${t("cb.title")}</div><div id="cbResult"></div></div>

}

function recomputeWhatIf(){
  ["salary","bonus","pensionPct","bonusSac","baye","holiday","saye","dental"].forEach(id=>{
    const el=document.getElementById("wi_"+id);if(el)state.whatif[id]=el.value===""?0:parseFloat(el.value);
  });
  const w=state.whatif, r=computeWhatIf(w);
  const wr=document.getElementById("wiResult");
  if(wr)wr.innerHTML=`
    <table class="breakdown">
      <tr><td></td><td style="color:var(--muted);font-weight:600">${t("wi.annual")}</td><td style="color:var(--muted);font-weight:600">${t("wi.monthly")}</td></tr>
      <tr><td>${t("wi.salary")}</td><td>${money(w.salary)}</td><td>${money(w.salary/12,true)}</td></tr>
      <tr><td>+ ${t("wi.bonus")}</td><td class="num">${money(w.bonus)}</td><td class="num">${money(w.bonus/12,true)}</td></tr>
      <tr><td>− ${t("wi.pension")}</td><td class="num">−${money(r.totalPension)}</td><td class="num">−${money(r.totalPension/12,true)}</td></tr>
      <tr><td>− ${t("wi.baye")}</td><td class="num">−${money(w.baye)}</td><td class="num">−${money(w.baye/12,true)}</td></tr>
      <tr><td>− ${t("wi.holiday")}</td><td class="num">−${money(w.holiday)}</td><td class="num">−${money(w.holiday/12,true)}</td></tr>
      <tr class="total"><td>${t("wi.taxable")}</td><td>${money(r.taxable)}</td><td>${money(r.taxable/12,true)}</td></tr>
      <tr><td>− ${t("wi.incometax")}</td><td class="num neg">−${money(r.tax)}</td><td class="num neg">−${money(r.tax/12,true)}</td></tr>
      <tr><td>− ${t("wi.nino")}</td><td class="num neg">−${money(r.ni)}</td><td class="num neg">−${money(r.ni/12,true)}</td></tr>
      <tr><td>− ${t("wi.posttax")}</td><td class="num neg">−${money(r.postTax)}</td><td class="num neg">−${money(r.postTax/12,true)}</td></tr>
      <tr class="total"><td>${t("wi.netyear")}</td><td>${money(r.net)}</td><td>${money(r.net/12,true)}</td></tr>
    </table>`;
  const cb=document.getElementById("cbResult");
  if(cb){
    const status=r.ani<=HICBC_LOW?`<span class="pill ok">${t("cb.full")}</span>`:r.ani>=HICBC_HIGH?`<span class="pill warn">${t("cb.none")}</span>`:`<span class="pill warn">${t("cb.taper")}</span>`;
    cb.innerHTML=`<div class="kpis">
      <div class="kpi"><div class="k-label">${t("cb.ani")}</div><div class="k-value">${money(r.ani)}</div><div class="k-sub">${t("cb.thresh")}</div></div>
      <div class="kpi"><div class="k-label">${t("cb.status")}</div><div class="k-value" style="font-size:16px">${status}</div><div class="k-sub">${t("cb.keep")}: ${money(r.keep)} / ${money(r.cb)}</div></div>
      <div class="kpi"><div class="k-label">${t("cb.target")}</div><div class="k-value" ${r.extraPension>0?'style="color:var(--accent2)"':''}>${r.extraPension>0?money(r.extraPension):"0"}</div><div class="k-sub">${r.extraPension>0?money(r.extraPension/12,true)+" "+t("wi.perMonth"):t("cb.targetnone")}</div></div>
    </div>`;
  }
}

function fyTotals(){
  const agg={};
  liveRows().forEach(r=>{const a=agg[r.fy]||(agg[r.fy]={fy:r.fy,months:0,salary:0,pension:0,tax:0,ni:0,net:0});
    a.months++;a.salary+=r.salary||0;a.pension+=r.pension||0;a.tax+=r.paye||0;a.ni+=r.ni||0;a.net+=r.net||0;});
  const keys=Object.keys(agg).sort((a,b)=>b.localeCompare(a));
  const body=keys.map(k=>{const a=agg[k];return `<tr>
    <td class="l">${a.fy}</td><td class="num">${a.months}</td>
    <td class="num">${money(a.salary)}</td><td class="num">${money(-a.pension)}</td>
    <td class="num">${money(-a.tax)}</td><td class="num">${money(-a.ni)}</td>
    <td class="num" style="font-weight:700">${money(a.net)}</td></tr>`;}).join("");
  return `<div class="subcard"><div class="eyebrow">${t("fy.title")}</div>
    <div class="table-wrap"><table><thead><tr>
      <th class="l">${t("fy.year")}</th><th>${t("fy.months")}</th><th>${t("fy.salary")}</th><th>${t("fy.pension")}</th><th>${t("fy.tax")}</th><th>${t("fy.ni")}</th><th>${t("fy.net")}</th>
    </tr></thead><tbody>${body}</tbody></table></div></div>`;
}

function wire(){
  const doc=state.doc;
  const add=document.getElementById("addBtn");
  if(add)add.onclick=()=>{
    const ym=inputToYm(document.getElementById("i_month").value);
    if(!ym){alert("Enter the month as YYYYMM, e.g. 202607");return;}
    if(liveRows().some(r=>r.month===ym)){alert("A payslip for "+ym+" already exists.");return;}
    const g=id=>{const v=document.getElementById(id).value;return v===""?null:parseFloat(v);};
    const salary=g("i_salary"),pretax=g("i_pretax")||0,pension=g("i_pension")||0,paye=g("i_paye")||0,ni=g("i_ni")||0,saye=g("i_saye"),dental=g("i_dental");
    const gross=(salary||0)+pretax+pension;const net=gross+paye+ni+(saye||0)+(dental||0);
    const y=+ym.slice(0,4),m=+ym.slice(5,7);const fy=m>=4?`${y}/${String(y+1).slice(2)}`:`${y-1}/${String(y).slice(2)}`;
    doc.rows.push({month:ym,date:ym+"-15",fy,taxCode:"",salary,preTax:pretax,pension,gross,paye,ni,saye,dental,net,note:"",deleted:false,source:"manual"});
    doc.rows.sort((a,b)=>a.month.localeCompare(b.month));render();
  };
  const sb=document.getElementById("searchBox");if(sb)sb.oninput=e=>{state.search=e.target.value;render();};
  const ps=document.getElementById("pageSize");if(ps)ps.onchange=e=>{state.pageSize=e.target.value==="all"?"all":parseInt(e.target.value,10);render();};
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm(t("confirm.delete"))){const r=doc.rows.find(x=>x.month===b.dataset.del&&!x.deleted);if(r)r.deleted=true;render();}});
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{state.edit=b.dataset.edit;render();});
  // edit modal
  const ec=document.getElementById("editCancel");if(ec)ec.onclick=()=>{state.edit=null;render();};
  const eb=document.getElementById("editBack");if(eb)eb.onclick=e=>{if(e.target===eb){state.edit=null;render();}};
  const es=document.getElementById("editSave");
  if(es)es.onclick=()=>{
    const r=liveRows().find(x=>x.month===state.edit);if(!r){state.edit=null;render();return;}
    const g=id=>{const el=document.getElementById("e_"+id);const v=el.value;return v===""?null:parseFloat(v);};
    r.salary=g("salary");r.pension=g("pension")||0;r.preTax=g("pretax")||0;r.paye=g("paye")||0;r.ni=g("ni")||0;r.saye=g("saye");r.dental=g("dental");
    r.gross=(r.salary||0)+(r.preTax||0)+(r.pension||0);
    r.net=(r.gross||0)+(r.paye||0)+(r.ni||0)+(r.saye||0)+(r.dental||0);
    state.edit=null;render();
  };
  ["salary","bonus","pensionPct","bonusSac","baye","holiday","saye","dental"].forEach(id=>{const el=document.getElementById("wi_"+id);if(el)el.oninput=recomputeWhatIf;});
}

function exportRows(){const rows=state.doc.rows.filter(r=>!r.deleted).sort((a,b)=>a.month.localeCompare(b.month)).map(r=>[r.month,r.fy,r.salary,r.pension,r.gross,r.paye,r.ni,r.saye,r.dental,r.net]);return {filename:"pay-summary",headers:["Month","Tax year","Salary","Pension","Gross","PAYE","NI","SAYE","Dental","Net"],rows};}
function exportSheets(){const e=exportRows();return {filename:e.filename,sheets:[{name:"Payslips",headers:e.headers,rows:e.rows}]};}
return { render, getDoc:()=>state.doc, exportRows, exportSheets };
})();

const MONTHS_EN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtMonth(ym){if(!ym)return"—";const[y,m]=ym.split("-").map(Number);return APP.lang==="zh"?`${y}年${m}月`:`${MONTHS_EN[m-1]} ${y}`;}
function fmtDate(d){if(!d)return"—";const[y,m,da]=d.split("-").map(Number);return APP.lang==="zh"?`${y}年${m}月${da}日`:`${da} ${MONTHS_EN[m-1]} ${y}`;}
function gbp(n,cents){if(n==null||isNaN(n))return"—";return new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP",minimumFractionDigits:cents?2:0,maximumFractionDigits:cents?2:0}).format(n);}
function ymToInput(ym){return ym?ym.replace("-",""):"";}
function inputToYm(str){if(str===""||str==null)return"";const d=String(str).replace(/\D/g,"");if(d.length!==6)return null;const m=+d.slice(4,6);if(m<1||m>12)return null;return d.slice(0,4)+"-"+d.slice(4,6);}
function ymdToInput(d){return d?d.replace(/-/g,""):"";}
function inputToYmd(str){if(str===""||str==null)return"";const s=String(str).replace(/\D/g,"");if(s.length!==8)return null;const m=+s.slice(4,6),da=+s.slice(6,8);if(m<1||m>12||da<1||da>31)return null;return s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8);}
function today(){return new Date().toISOString().slice(0,10);}
function catLabel(c){return t("cat."+c)||c;}
function optTag(v,l,cur){return `<option value="${v}" ${cur===v?"selected":""}>${l}</option>`;}
function liveItems(){return state.doc.items.filter(i=>!i.deleted);}
function thisYear(){return String(new Date().getFullYear());}
function sortedLog(i){return (i.weightLog||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));}
function currentWeight(i){const l=sortedLog(i);return l.length?l[l.length-1].weight:(i.weightOrig??null);}
function firstWeight(i){const l=sortedLog(i);return l.length?l[0].weight:(i.weightOrig??null);}
function lastDate(i){const l=sortedLog(i);return l.length?l[l.length-1].date:null;}
function r2(n){return n==null||isNaN(n)?null:Math.round(n*100)/100;}
function consumedToDate(i){const f=firstWeight(i),c=currentWeight(i);if(f==null||c==null)return null;return r2(Math.max(0,f-c));}
function lastConsumption(i){const l=sortedLog(i);if(l.length<2)return null;return r2(Math.max(0,l[l.length-2].weight-l[l.length-1].weight));}
function progressPct(i){const c=consumedToDate(i);const net=+i.netWeight;if(c==null||!net)return null;return Math.max(0,Math.min(1,c/net));}
function remainingPct(i){const cw=currentWeight(i);return i.weightOrig?Math.max(0,Math.min(1,(cw||0)/i.weightOrig)):null;}
function weekMonday(dateStr){const d=new Date(dateStr+"T00:00:00");const off=(d.getDay()+6)%7;d.setDate(d.getDate()-off);return d.toISOString().slice(0,10);}
// consumption events from consecutive readings
function consumptionEvents(items){const ev=[];items.forEach(i=>{const l=sortedLog(i);for(let k=1;k<l.length;k++){const amt=l[k-1].weight-l[k].weight;if(amt>0)ev.push({date:l[k].date,unit:i.unit||"",amount:amt,name:i.name,cat:i.category});}});return ev;}

function captureFocus(){const el=document.activeElement;if(!el||!el.id)return null;let sel=null;try{sel={s:el.selectionStart,e:el.selectionEnd};}catch(e){}return{id:el.id,sel};}
function restoreFocus(f){if(!f)return;const el=document.getElementById(f.id);if(!el)return;el.focus();if(f.sel){try{el.setSelectionRange(f.sel.s,f.sel.e);}catch(e){}}}

function render(){
  const focus=captureFocus();
  document.getElementById("app").innerHTML=inputSection()+reviewSection()+insightsSection()+editModal()+weightModal();
  wire();restoreFocus(focus);
}

function filteredItems(){
  const q=state.search.trim().toLowerCase();
  let arr=liveItems().filter(i=>{
    if(state.filterCat!=="all"&&i.category!==state.filterCat)return false;
    if(state.filterStatus==="use"&&i.usedUp)return false;
    if(state.filterStatus==="done"&&!i.usedUp)return false;
    if(state.filterPan==="in"&&!i.inPan)return false;
    if(state.filterPan==="out"&&i.inPan)return false;
    if(q&&![i.name,i.brand,catLabel(i.category),i.category,i.purchased,i.usedUp||""].join(" ").toLowerCase().includes(q))return false;
    return true;
  });
  const dir=state.sortDir==="asc"?1:-1;
  const key=i=>{switch(state.sortBy){
    case "cost":return +i.cost||0;
    case "name":return (i.name||"").toLowerCase();
    case "usedup":return i.usedUp||"";
    case "remaining":return progressPct(i)==null?-1:progressPct(i);
    default:return i.purchased||"";
  }};
  arr.sort((a,b)=>{const ka=key(a),kb=key(b);return ka<kb?-dir:ka>kb?dir:0;});
  return arr;
}

/* ===== insights ===== */
function periodOf(ym){return state.view==="year"?(ym?ym.slice(0,4):""):(ym?ym.slice(0,7):"");}
function fmtPeriod(p){return state.view==="year"?p:fmtMonth(p);}
function insightsSection(){
  const items=liveItems();
  const inUse=items.filter(i=>!i.usedUp).length;
  const finished=items.filter(i=>i.usedUp).length;
  const totalSpent=items.reduce((s,i)=>s+(+i.cost||0),0);
  const yr=thisYear();
  const spentYr=items.filter(i=>(i.purchased||"").startsWith(yr)).reduce((s,i)=>s+(+i.cost||0),0);
  const stash=items.filter(i=>!i.usedUp).reduce((s,i)=>s+(+i.cost||0),0);
  const pannedYr=items.filter(i=>(i.usedUp||"").startsWith(yr)).length;

  /* bought vs consumed */
  const bcItems=items.filter(i=>state.bcFilterCat==="all"||i.category===state.bcFilterCat);
  const per={};
  bcItems.forEach(i=>{
    if(i.purchased){const p=periodOf(i.purchased);const o=(per[p]=per[p]||{p,bcount:0,bcost:0,fcount:0,fcost:0});o.bcount++;o.bcost+=(+i.cost||0);}
    if(i.usedUp){const p=periodOf(i.usedUp);const o=(per[p]=per[p]||{p,bcount:0,bcost:0,fcount:0,fcost:0});o.fcount++;o.fcost+=(+i.cost||0);}
  });
  let periods=Object.values(per).map(x=>({...x,netqty:x.bcount-x.fcount,netval:x.bcost-x.fcost}));
  const bcDir=state.bcSortDir==="asc"?1:-1;
  const bcKey=x=>{switch(state.bcSortBy){case"bought":return x.bcount;case"spend":return x.bcost;case"finished":return x.fcount;case"finishedval":return x.fcost;case"netqty":return x.netqty;case"netval":return x.netval;default:return x.p;}};
  periods.sort((a,b)=>{const ka=bcKey(a),kb=bcKey(b);return ka<kb?-bcDir:ka>kb?bcDir:0;});
  const maxCost=Math.max(1,...periods.map(x=>Math.max(x.bcost,x.fcost)));
  const netCls=v=>v<0?"pos":v>0?"neg":"";const netSign=v=>v>0?"+":"";
  const bcRows=periods.map(x=>`<tr>
    <td class="l">${fmtPeriod(x.p)}</td><td class="num">${x.bcount||""}</td><td class="num">${x.bcost?gbp(x.bcost):""}</td>
    <td><div class="bartrack"><div class="bar" style="width:${Math.round(x.bcost/maxCost*100)}%"></div></div></td>
    <td class="num">${x.fcount||""}</td><td class="num">${x.fcost?gbp(x.fcost):""}</td>
    <td class="num ${netCls(x.netqty)}">${netSign(x.netqty)}${x.netqty}</td><td class="num ${netCls(x.netval)}">${netSign(x.netval)}${gbp(x.netval)}</td>
  </tr>`).join("");

  /* consumption by frequency, by category (excl. Fragrance) */
  const wkCut=weekMonday((()=>{const d=new Date();d.setFullYear(d.getFullYear()-1);return d.toISOString().slice(0,10);})());
  let cEvents=consumptionEvents(items).filter(e=>e.cat!=="Fragrance");
  if(state.wkFreq==="week")cEvents=cEvents.filter(e=>weekMonday(e.date)>=wkCut);
  const catsPresent=CATEGORIES.filter(c=>c!=="Fragrance"&&cEvents.some(e=>e.cat===c));
  const pKey=d=>state.wkFreq==="year"?d.slice(0,4):state.wkFreq==="month"?d.slice(0,7):weekMonday(d);
  const pLabel=p=>state.wkFreq==="year"?p:state.wkFreq==="month"?fmtMonth(p):fmtDate(p);
  const byWeek={};
  cEvents.forEach(e=>{const p=pKey(e.date);const o=(byWeek[p]=byWeek[p]||{});(o[e.cat]=o[e.cat]||{})[e.unit]=(o[e.cat][e.unit]||0)+e.amount;});
  const wkDir=state.wkSortDir==="asc"?1:-1;
  const weeks=Object.keys(byWeek).sort((a,b)=>a<b?-wkDir:a>b?wkDir:0);
  const round1=n=>Math.round(n*10)/10;
  const wkCell=o=>o?Object.entries(o).map(([u,v])=>round1(v)+" "+u).join(" + "):"";
  const wkRows=weeks.map(w=>`<tr><td class="l">${pLabel(w)}</td>${catsPresent.map(c=>`<td class="num">${wkCell(byWeek[w][c])}</td>`).join("")}</tr>`).join("");

  return `<section class="section"><h2>${t("sec.insights.title")}</h2>
    <div class="rowflex" style="margin-bottom:16px">
      <span class="seg"><button class="${state.view==="month"?"on":""}" data-view="month">${t("view.month")}</button><button class="${state.view==="year"?"on":""}" data-view="year">${t("view.year")}</button></span>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="k-label">${t("kpi.inuse")}</div><div class="k-value">${inUse}</div><div class="k-sub">${t("kpi.items")}</div></div>
      <div class="kpi"><div class="k-label">${t("kpi.finished")}</div><div class="k-value">${finished}</div><div class="k-sub">${t("kpi.pannedYr")}: ${pannedYr}</div></div>
      <div class="kpi"><div class="k-label">${t("kpi.totalspent")}</div><div class="k-value">${gbp(totalSpent)}</div><div class="k-sub">${t("kpi.spentYr")}: ${gbp(spentYr)}</div></div>
      <div class="kpi"><div class="k-label">${t("kpi.stash")}</div><div class="k-value">${gbp(stash)}</div><div class="k-sub">${inUse} ${t("kpi.items")}</div></div>
    </div>

    <div class="subcard"><div class="eyebrow">${t("bc.title")}</div>
      <div class="rowflex">
        <label class="field">${t("filter.cat")}<select id="bcFCat">${optTag("all",t("filter.all"),state.bcFilterCat)}${CATEGORIES.map(c=>optTag(c,catLabel(c),state.bcFilterCat)).join("")}</select></label>
        <label class="field">${t("sort.by")}<select id="bcSortBy">${optTag("period",t("bc.period"),state.bcSortBy)}${optTag("bought",t("bc.bought"),state.bcSortBy)}${optTag("spend",t("bc.boughtcost"),state.bcSortBy)}${optTag("finished",t("bc.finished"),state.bcSortBy)}${optTag("finishedval",t("bc.finishedcost"),state.bcSortBy)}${optTag("netqty",t("bc.netqty"),state.bcSortBy)}${optTag("netval",t("bc.netval"),state.bcSortBy)}</select></label>
        <button class="btn icon" id="bcSortDir" title="${t("sort.dir")}">${state.bcSortDir==="asc"?"↑":"↓"}</button>
      </div>
      <div class="table-wrap"><table><thead><tr>
        <th class="l">${t("bc.period")}</th><th>${t("bc.bought")}</th><th>${t("bc.boughtcost")}</th><th></th><th>${t("bc.finished")}</th><th>${t("bc.finishedcost")}</th><th>${t("bc.netqty")}</th><th>${t("bc.netval")}</th>
      </tr></thead><tbody>${bcRows||""}</tbody></table></div>
    </div>

    <div class="subcard"><div class="eyebrow">${t("wk.title")}</div>
      <div class="rowflex">
        <span class="seg"><button class="${state.wkFreq==="week"?"on":""}" data-wkfreq="week">${t("freq.week")}</button><button class="${state.wkFreq==="month"?"on":""}" data-wkfreq="month">${t("freq.month")}</button><button class="${state.wkFreq==="year"?"on":""}" data-wkfreq="year">${t("freq.year")}</button></span>
        <button class="btn icon" id="wkSortDir" title="${t("sort.dir")}">${state.wkSortDir==="asc"?"↑":"↓"}</button>
      </div>
      ${weeks.length?`<div class="table-wrap"><table><thead><tr><th class="l">${t("bc.period")}</th>${catsPresent.map(c=>`<th>${catLabel(c)}</th>`).join("")}</tr></thead><tbody>${wkRows}</tbody></table></div>`:`<div style="color:var(--muted)">${t("wk.none")}</div>`}
    </div>
  </section>`;
}

  const wsd=document.getElementById("wkSortDir");if(wsd)wsd.onclick=()=>{state.wkSortDir=state.wkSortDir==="asc"?"desc":"asc";render();};
  document.querySelectorAll("[data-wkfreq]").forEach(b=>b.onclick=()=>{state.wkFreq=b.dataset.wkfreq;render();});

  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{state.edit=+b.dataset.edit;render();});
  document.querySelectorAll("[data-weight]").forEach(b=>b.onclick=()=>{state.weightItem=+b.dataset.weight;render();});

  const ed=document.getElementById("editDelete");if(ed)ed.onclick=()=>{if(confirm(t("confirm.delete"))){const it=liveItems().find(x=>x.id===state.edit);if(it)it.deleted=true;state.edit=null;render();}};
  // edit modal
  const ec=document.getElementById("editCancel");if(ec)ec.onclick=()=>{state.edit=null;render();};
  const eb=document.getElementById("editBack");if(eb)eb.onclick=e=>{if(e.target===eb){state.edit=null;render();}};
  const es=document.getElementById("editSave");
  if(es)es.onclick=()=>{
    const i=liveItems().find(x=>x.id===state.edit);if(!i){state.edit=null;render();return;}
    const p=inputToYm(document.getElementById("e_purchased").value);if(p===null){alert("Purchased date must be YYYYMM.");return;}
    const u=inputToYm(document.getElementById("e_usedup").value);if(u===null){alert("Used-up date must be YYYYMM or blank.");return;}
    const wo=parseFloat(document.getElementById("e_worig").value);
    i.name=document.getElementById("e_name").value.trim();i.category=document.getElementById("e_cat").value;i.brand=document.getElementById("e_brand").value.trim();
    i.qty=parseFloat(document.getElementById("e_qty").value)||1;i.cost=parseFloat(document.getElementById("e_cost").value)||0;
    i.purchased=p||"";i.usedUp=u||null;i.weightOrig=isNaN(wo)?null:wo;const nw=parseFloat(document.getElementById("e_net").value);i.netWeight=isNaN(nw)?null:nw;i.unit=document.getElementById("e_unit").value.trim()||"ml";
    i.inPan=document.getElementById("e_inpan").checked;state.edit=null;render();
  };

  // weight modal
  const wc=document.getElementById("weightClose");if(wc)wc.onclick=()=>{state.weightItem=null;render();};
  const wb=document.getElementById("weightBack");if(wb)wb.onclick=e=>{if(e.target===wb){state.weightItem=null;render();}};
  const wa=document.getElementById("wlAdd");
  if(wa)wa.onclick=()=>{
    const i=liveItems().find(x=>x.id===state.weightItem);if(!i)return;
    const d=inputToYmd(document.getElementById("wl_date").value);
    if(!d){alert("Date must be YYYYMMDD, e.g. 20260518");return;}
    const w=parseFloat(document.getElementById("wl_weight").value);
    if(isNaN(w)){alert("Enter a weight.");return;}
    if(!i.weightLog)i.weightLog=[];
    i.weightLog=i.weightLog.filter(r=>r.date!==d);   // one reading per date
    i.weightLog.push({date:d,weight:w});
    render();
  };
  document.querySelectorAll("[data-wldel]").forEach(b=>b.onclick=()=>{
    const i=liveItems().find(x=>x.id===state.weightItem);if(!i)return;
    const [d,w]=b.dataset.wldel.split("|");
    i.weightLog=(i.weightLog||[]).filter(r=>!(r.date===d&&String(r.weight)===w));render();
  });
}


function exportRows(){const rows=liveItems().map(i=>[i.name,i.brand,i.category,i.qty,i.cost,i.purchased,i.usedUp||"",i.unit,i.weightOrig,currentWeight(i),i.inPan?"Yes":"No",i.usedUp?"Finished":"In use"]);return {filename:"project-pan",headers:["Item","Brand","Category","Qty","Cost","Purchased","Used up","Unit","Original weight","Current weight","In pan","Status"],rows};}
function exportSheets(){
  const items=liveItems();
  const itemRows=items.map(i=>[i.name,i.brand,i.category,i.qty,i.cost,i.purchased,i.usedUp||"",i.unit,i.weightOrig,currentWeight(i),i.inPan?"Yes":"No",i.usedUp?"Finished":"In use"]);
  const logRows=[];items.forEach(i=>sortedLog(i).forEach(r=>logRows.push([i.name,r.date,r.weight,i.unit])));
  const ev=consumptionEvents(items);const bym={};ev.forEach(e=>{const k=e.date.slice(0,7)+"|"+e.cat+"|"+e.unit;bym[k]=(bym[k]||0)+e.amount;});
  const consRows=Object.entries(bym).map(([k,v])=>{const p=k.split("|");return [p[0],p[1],Math.round(v*10)/10,p[2]];}).sort((a,b)=>b[0].localeCompare(a[0]));
  return {filename:"project-pan",sheets:[
    {name:"Items",headers:["Item","Brand","Category","Qty","Cost","Purchased","Used up","Unit","Original weight","Current weight","In pan","Status"],rows:itemRows},
    {name:"Weight log",headers:["Item","Date","Weight","Unit"],rows:logRows},
    {name:"Consumption (monthly)",headers:["Month","Category","Amount","Unit"],rows:consRows}
  ]};
}
return {render, getDoc:()=>state.doc, exportRows, exportSheets};
})();
const TABS=[{id:"mortgage",mod:Mortgage},{id:"pay",mod:Pay},{id:"fire"},{id:"cycle"},{id:"weight"},{id:"yoyo"},{id:"pan",mod:Pan},{id:"nursery"}];
function paint(){
  document.documentElement.setAttribute("data-theme",APP.theme);
  document.querySelectorAll("[data-chrome]").forEach(el=>el.textContent=chrome(el.getAttribute("data-chrome")));
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("on",b.dataset.themeSet===APP.theme));
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("on",b.dataset.langSet===APP.lang));
  document.getElementById("tabnav").innerHTML=TABS.map(tb=>`<button class="tab ${APP.tab===tb.id?"active":""} ${tb.mod?"":"soon"}" data-tab="${tb.id}">${chrome("nav."+tb.id)}</button>`).join("");
  document.querySelectorAll("#tabnav [data-tab]").forEach(b=>{const tb=TABS.find(x=>x.id===b.dataset.tab);if(tb&&tb.mod)b.onclick=()=>{APP.tab=b.dataset.tab;paint();};});
  const active=TABS.find(x=>x.id===APP.tab);

}
document.querySelectorAll("#themeSeg button").forEach(b=>b.onclick=()=>{APP.theme=b.dataset.themeSet;paint();});
document.querySelectorAll("#langSeg button").forEach(b=>b.onclick=()=>{APP.lang=b.dataset.langSet;paint();});
const MODS=[["mortgage",Mortgage],["pay",Pay],["pan",Pan]];
function saveAll(){MODS.forEach(([k,m])=>{try{if(m.getDoc)STORE.save(k,m.getDoc());}catch(e){}});const el=document.getElementById("saveStatus");if(el)el.textContent="\u2713 "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}

/* ===== spreadsheet export (xlsx via SheetJS, CSV fallback offline) ===== */
async function loadSheetJS(){if(window.XLSX)return window.XLSX;await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});return window.XLSX;}
async function exportActive(){
  const active=TABS.find(x=>x.id===APP.tab);
  if(!active||!active.mod||!active.mod.exportSheets){alert("Nothing to export on this tab yet.");return;}
  const {filename,sheets}=active.mod.exportSheets();const date=new Date().toISOString().slice(0,10);
  try{const XLSX=await loadSheetJS();const wb=XLSX.utils.book_new();sheets.forEach(s=>{const ws=XLSX.utils.aoa_to_sheet([s.headers,...s.rows]);XLSX.utils.book_append_sheet(wb,ws,s.name.slice(0,31));});XLSX.writeFile(wb,filename+"-"+date+".xlsx");}
  catch(e){const s=sheets[0];download(filename+"-"+date+".csv",toCsv(s.headers,s.rows),"text/csv;charset=utf-8");}
}

/* ===== Google Drive backup ===== */
const GOOGLE_CLIENT_ID="957283380777-kug9ui3jb8npj8ijdskolmj1k3m52kss.apps.googleusercontent.com";
const DRIVE_SCOPE="https://www.googleapis.com/auth/drive.file";
const DRIVE_FOLDER="Life Tracker";
let _driveToken=null,_tokenClient=null,_driveFolderId=null;
function driveConfigured(){return GOOGLE_CLIENT_ID.indexOf("PASTE_YOUR")<0;}
function driveReady(){return typeof google!=="undefined"&&google.accounts&&google.accounts.oauth2&&driveConfigured();}
function driveGetToken(interactive){return new Promise((resolve,reject)=>{
  if(!driveReady()){reject(new Error("Google Drive isn't set up yet — see SETUP."));return;}
  if(!_tokenClient)_tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:DRIVE_SCOPE,callback:r=>{if(r&&r.error){reject(new Error(r.error));return;}_driveToken=r.access_token;resolve(_driveToken);}});
  _tokenClient.error_callback=e=>reject(new Error((e&&e.type)||"sign-in failed"));
  try{_tokenClient.requestAccessToken({prompt:interactive?"consent":""});}catch(e){reject(e);}
});}
async function driveFetch(url,opts){opts=opts||{};opts.headers=Object.assign({Authorization:"Bearer "+_driveToken},opts.headers||{});let r=await fetch(url,opts);if(r.status===401){await driveGetToken(true);opts.headers.Authorization="Bearer "+_driveToken;r=await fetch(url,opts);}return r;}
async function driveEnsureFolder(){
  if(_driveFolderId)return _driveFolderId;
  const q=encodeURIComponent("name='"+DRIVE_FOLDER+"' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const j=await(await driveFetch("https://www.googleapis.com/drive/v3/files?q="+q+"&spaces=drive&fields=files(id,name)")).json();
  if(j.files&&j.files.length){_driveFolderId=j.files[0].id;return _driveFolderId;}
  const cj=await(await driveFetch("https://www.googleapis.com/drive/v3/files",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:DRIVE_FOLDER,mimeType:"application/vnd.google-apps.folder"})})).json();
  _driveFolderId=cj.id;return _driveFolderId;
}
function driveBundle(){return {app:"life-tracker",schema:1,savedAt:new Date().toISOString(),device:(navigator.userAgent||"").slice(0,70),data:{mortgage:Mortgage.getDoc&&Mortgage.getDoc(),pay:Pay.getDoc&&Pay.getDoc(),pan:Pan.getDoc&&Pan.getDoc()}};}
async function driveBackup(){
  if(!_driveToken)await driveGetToken(false).catch(()=>driveGetToken(true));
  const folder=await driveEnsureFolder();const b=driveBundle();
  const name="life-tracker-"+b.savedAt.replace(/[:.]/g,"-")+".json";
  const boundary="----lt"+Date.now();
  const body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify({name,parents:[folder]})+"\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(b)+"\r\n--"+boundary+"--";
  const r=await driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,createdTime",{method:"POST",headers:{"Content-Type":"multipart/related; boundary="+boundary},body});
  if(!r.ok)throw new Error("backup failed ("+r.status+")");
  STORE.save("lastDriveBackup",b.savedAt);await drivePrune().catch(()=>{});return await r.json();
}
async function driveList(){
  const folder=await driveEnsureFolder();
  const q=encodeURIComponent("'"+folder+"' in parents and trashed=false");
  const j=await(await driveFetch("https://www.googleapis.com/drive/v3/files?q="+q+"&orderBy=createdTime desc&fields=files(id,name,createdTime)")).json();
  return (j.files||[]).filter(f=>f.name.indexOf("life-tracker-")===0);
}
async function drivePrune(){const files=await driveList();for(const f of files.slice(15))await driveFetch("https://www.googleapis.com/drive/v3/files/"+f.id,{method:"DELETE"});}
async function driveRestore(id){
  const b=await(await driveFetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media")).json();
  if(!b||!b.data)throw new Error("not a valid backup");
  if(b.data.mortgage)STORE.save("mortgage",b.data.mortgage);
  if(b.data.pay)STORE.save("pay",b.data.pay);
  if(b.data.pan)STORE.save("pan",b.data.pan);
  STORE.save("lastDriveBackup",b.savedAt||new Date().toISOString());location.reload();
}
function openBackup(){
  let ov=document.getElementById("backupOverlay");
  if(!ov){ov=document.createElement("div");ov.id="backupOverlay";ov.className="modal-back";document.body.appendChild(ov);}
  ov.innerHTML='<div class="modal"><h3>Google Drive backup</h3><div id="bkStatus" class="sub" style="margin-bottom:12px"></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" id="bkBackup">Back up now</button><button class="btn" id="bkList">Show backups</button><button class="btn ghost" id="bkClose">Close</button></div><div id="bkFiles" style="margin-top:14px"></div><p class="sub" style="margin-top:12px">Backups live in a "Life Tracker" folder in your Drive. This app can only see files it created.</p></div>';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  const st=ov.querySelector("#bkStatus");
  st.textContent=driveConfigured()?"Ready — connect to back up or restore.":"Not set up yet: add your Google Client ID and host the app (see SETUP.md).";
  ov.querySelector("#bkClose").onclick=()=>ov.remove();
  ov.querySelector("#bkBackup").onclick=async()=>{st.textContent="Backing up…";try{const f=await driveBackup();st.textContent="Backed up "+new Date().toLocaleTimeString();}catch(e){st.textContent="Error: "+e.message;}};
  ov.querySelector("#bkList").onclick=async()=>{st.textContent="Loading…";try{const files=await driveList();const box=ov.querySelector("#bkFiles");if(!files.length){box.innerHTML='<div class="sub">No backups yet.</div>';st.textContent="";return;}const local=STORE.load("lastDriveBackup");const newest=files[0];const newer=!local||(newest.createdTime>local);box.innerHTML=(newer?'<div class="demo-note" style="margin-bottom:10px">A newer backup exists (likely from your other device) — you may want to restore it.</div>':'')+'<div class="table-wrap"><table><tbody>'+files.map(f=>'<tr><td class="l">'+new Date(f.createdTime).toLocaleString()+'</td><td style="text-align:right"><button class="btn sm" data-rst="'+f.id+'">Restore</button></td></tr>').join("")+'</tbody></table></div>';box.querySelectorAll("[data-rst]").forEach(b=>b.onclick=()=>{if(confirm("Restore this backup? It replaces the data on this device."))driveRestore(b.dataset.rst).catch(e=>st.textContent="Error: "+e.message);});st.textContent="";}catch(e){st.textContent="Error: "+e.message;}};
}
setInterval(()=>{if(_driveToken)driveBackup().catch(()=>{});},5*60*1000);
const _xb=document.getElementById("exportBtn");if(_xb)_xb.onclick=exportActive;
const _bb=document.getElementById("backupBtn");if(_bb)_bb.onclick=openBackup;
paint();
